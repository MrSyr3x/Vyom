name: Rust CI Quality Gates

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-test:
    name: 🛡️ Audit & Test
    runs-on: macos-latest
    env:
      RUST_BACKTRACE: 1
      TERM: xterm-256color
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🦀 Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: ⚡ Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: 🎨 Format Verification
      run: cargo fmt --all -- --check

    - name: 🧐 Audit Lints (Relaxed)
      run: cargo clippy --all-targets --all-features

    - name: 🧪 Run Unit Test Suite (Diagnostic)
      # Run with --nocapture so we can see the panic message in the log
      run: cargo test --all-features -- --nocapture --test-threads=1
